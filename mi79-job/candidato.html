<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechRecruit // Perfil do Candidato</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body id="page-detalhe"> <nav class="nav-bar">
        <div class="container nav-container">
            <div class="logo">TECHRECRUIT <span class="mono-eyebrow">// CANDIDATE PROFILE</span></div>
            <div class="nav-links"><span class="mono-eyebrow">v1.0.4</span></div>
        </div>
    </nav>

    <main class="canvas-light">
        <div class="container section-padding">
            <button onclick="window.history.back()" class="button-outline" style="margin-bottom: 32px;">← BACK TO LIST</button>
            
            <span class="mono-eyebrow section-title">CANDIDATE PROFILE</span>
            
            <div id="candidate-detail-card">

                <div class="detail-layout">
                    <div>
                        <img src="https://randomuser.me/api/portraits/men/1.jpg" alt="Foto Mockup">
                        <a href="#" class="button-primary" style="margin-top: 24px;">HIRE CANDIDATE</a>
                    </div>
                    <div class="detail-info">
                        <h2 class="display-xxl" style="color: var(--ink); font-size: 40px;">John Doe (Mockup)</h2>
                        
                        <div class="info-row">
                            <span class="mono-eyebrow label">APPLICATION STATUS</span>
                            <span class="mono-eyebrow"><span class="badge-mint">UNDER REVIEW</span></span>
                        </div>
                        <div class="info-row">
                            <span class="mono-eyebrow label">AGE</span>
                            <span class="body-md">30 years old</span>
                        </div>
                        <div class="info-row">
                            <span class="mono-eyebrow label">EMAIL ADDRESS</span>
                            <span class="body-md">john.doe@example.com</span>
                        </div>
                        <div class="info-row">
                            <span class="mono-eyebrow label">PHONE NUMBER</span>
                            <span class="body-md">11 99999-9999</span>
                        </div>
                        <div class="info-row">
                            <span class="mono-eyebrow label">LOCATION</span>
                            <span class="body-md">São Paulo, Brazil</span>
                        </div>
                    </div>
                </div>
                </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="footer-wordmark-banner">together.ai</div>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
